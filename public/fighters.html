<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fighters — Fighter Metrics</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🥊 Fighter Metrics</div>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/fighters" class="active">Fighters</a>
      <a href="/about">About</a>
    </div>
  </nav>

  <main class="container">
    <h1 class="page-title">Fighter Explorer</h1>

    <!-- Search -->
    <section class="section search-section">
      <div class="search-bar">
        <input type="text" id="fighter-search" placeholder="Search by ESPN athlete ID (e.g. 2335639 for Jon Jones)" />
        <button id="search-btn">Search</button>
      </div>
      <p class="hint">Try: <span class="id-hint" data-id="2335639">Jon Jones (2335639)</span> · <span class="id-hint" data-id="4285679">Israel Adesanya (4285679)</span> · <span class="id-hint" data-id="3022877">Conor McGregor (3022877)</span></p>
    </section>

    <!-- Fighter Profile Card -->
    <section class="section" id="profile-section" style="display:none;">
      <div class="profile-card" id="fighter-profile"></div>
      <div class="chart-wrapper" id="stats-chart-wrapper" style="display:none;">
        <canvas id="fighterStatsChart"></canvas>
      </div>
      <button id="save-btn" class="btn-save" style="display:none;">⭐ Save Fighter</button>
    </section>

    <!-- Current Card Fighters -->
    <section class="section">
      <h2>🥊 Fighters on Current Card</h2>
      <div id="card-fighters" class="fighters-grid">
        <p class="loading">Loading current card...</p>
      </div>
    </section>

    <!-- Saved Fighters Management -->
    <section class="section">
      <h2>⭐ Your Saved Fighters</h2>
      <div id="saved-list" class="fighters-grid">
        <p class="loading">Loading...</p>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>Fighter Metrics &copy; 2026 — Connor Rowland | Data: ESPN UFC API + Supabase</p>
  </footer>

  <script src="/js/fighters.js"></script>
</body>
</html>
